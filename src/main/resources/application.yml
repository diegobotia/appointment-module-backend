spring:
  application:
    name: appointments-module
  
  datasource:
    url: jdbc:postgresql://192.168.0.160:5432/centir_prod
    username: postgres
    password: t40DEL06V$
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    schemas: appointments
    split-statements: false
    
server:
  port: 8080

# Configuración de integración con otros módulos
integration:
  n8n:
    webhook-url: ${N8N_WEBHOOK_URL:}

# Springdoc (SwaggerUI) — deshabilitar en prod con perfil `prod`
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Actuator / Micrometer
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

security:
  jwt:
    secret: ${JWT_SECRET:N9Cib0jGaY+pQifpw/EVFyQq2gSQA2DeMDSTTHcx543anw/z0xlzPIKE1QL5rJJPkWcscfh275mHzg88I8FlxQ==}
  auth:
    diagnostics: ${SECURITY_AUTH_DIAGNOSTICS:false}
  n8n:
    api-key: ${N8N_API_KEY:change-this-in-production}
    base-path: ${N8N_BASE_PATH:/api/v1/integrations/n8n}

patient-registration:
  form-base-url: ${PATIENT_REGISTRATION_FORM_URL:https://citas.ipscentir.com/registro}

appointments:
  therapy:
    pending-group-policy: ${THERAPY_PENDING_GROUP_POLICY:RESCHEDULE}
    pending-group-cutoff-minutes: ${THERAPY_PENDING_GROUP_CUTOFF_MINUTES:120}
    pending-group-cutoff-cron: ${THERAPY_PENDING_GROUP_CUTOFF_CRON:0 */5 * * * *}
  n8n:
    event-forwarder-cron: ${N8N_EVENT_FORWARDER_CRON:0 */2 * * * *}
