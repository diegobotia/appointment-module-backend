spring:
  application:
    name: appointments-module
  
  datasource:
    url: jdbc:postgresql://localhost:5432/appointments
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update # Flyway maneja las migraciones, por lo que hibernación solo valida
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  flyway:
    enabled: false
    baseline-on-migrate: true
    locations: classpath:db/migration
    
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:admin@ipscentir.com}
    password: ${EMAIL_PASSWORD:secret}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080
  servlet:
    context-path: /api

# Configuración de integración con otros módulos
integration:
  patient-service:
    url: ${PATIENT_SERVICE_URL:http://localhost:8081}
  affiliation-service:
    url: ${AFFILIATION_SERVICE_URL:http://external-system/affiliation}
    timeout: 3000
  billing-service:
    url: ${BILLING_SERVICE_URL:http://localhost:8082}
  clinical-service:
    url: ${CLINICAL_SERVICE_URL:http://localhost:8083}

# Twilio (SMS y WhatsApp) — activar en prod con TWILIO_ENABLED=true
twilio:
  enabled: ${TWILIO_ENABLED:false}
  account-sid: ${TWILIO_ACCOUNT_SID:}
  auth-token: ${TWILIO_AUTH_TOKEN:}
  phone-number: ${TWILIO_PHONE_NUMBER:}
  whatsapp-number: ${TWILIO_WHATSAPP_NUMBER:}

# Resend (Email) — activar en prod con RESEND_ENABLED=true
resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:onboarding@resend.dev}
  enabled: ${RESEND_ENABLED:false}

# Notificaciones internas
notifications:
  enabled: ${NOTIFICATIONS_ENABLED:true}
  created-alert-enabled: ${NOTIFICATIONS_CREATED_ALERT_ENABLED:false}
  cancelled-alert-enabled: ${NOTIFICATIONS_CANCELLED_ALERT_ENABLED:false}
  reminder-24h-enabled: ${NOTIFICATIONS_REMINDER_24H_ENABLED:true}
  reminder-2h-enabled: ${NOTIFICATIONS_REMINDER_2H_ENABLED:false}
  max-retry-attempts: ${NOTIFICATIONS_MAX_RETRY_ATTEMPTS:3}
  retry-cron: ${NOTIFICATIONS_RETRY_CRON:0 */15 * * * *}
  reminder-2h-cron: ${NOTIFICATIONS_REMINDER_2H_CRON:0 */15 * * * *}

# Springdoc (SwaggerUI)
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging Level
logging:
  level:
    root: INFO
    com.ipscentir.appointments: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.web: DEBUG

security:
  n8n:
    api-key: ${N8N_API_KEY:change-this-in-production}
    base-path: ${N8N_BASE_PATH:/api/v1/integrations/n8n}

patient-registration:
  form-base-url: ${PATIENT_REGISTRATION_FORM_URL:https://citas.ipscentir.com/registro}

appointments:
  therapy:
    pending-group-policy: ${THERAPY_PENDING_GROUP_POLICY:RESCHEDULE}
    pending-group-cutoff-minutes: ${THERAPY_PENDING_GROUP_CUTOFF_MINUTES:120}
    pending-group-cutoff-cron: ${THERAPY_PENDING_GROUP_CUTOFF_CRON:0 */5 * * * *}
