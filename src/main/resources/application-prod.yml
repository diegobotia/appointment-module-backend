spring:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true

security:
  jwt:
    secret: ${JWT_SECRET}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

logging:
  level:
    root: WARN
    com.ipscentir.appointments: INFO
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
