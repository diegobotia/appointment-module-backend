# Perfil de producción para PostgreSQL directo (servidor local)
# Usa el datasource configurado en application.yml vía SPRING_DATASOURCE_*
# No incluye el perfil supabase — la conexión es directa a PostgreSQL.
spring:
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 36

security:
  jwt:
    secret: ${JWT_SECRET}

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

logging:
  level:
    root: WARN
    com.ipscentir.appointments: INFO
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
