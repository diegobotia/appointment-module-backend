spring:
  datasource:
    url: ${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${SUPABASE_DB_USERNAME:postgres}
    password: ${SUPABASE_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      data-source-properties:
        prepareThreshold: "0"

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 11
    locations: classpath:db/migration
    table: appointments_schema_history

supabase:
  url: ${SUPABASE_URL:https://project.supabase.co}
  api-key: ${SUPABASE_API_KEY:}

# true → logs [AUTH-401]/[AUTH-403] + DEBUG de Spring Security OAuth2
security:
  auth:
    diagnostics: ${SECURITY_AUTH_DIAGNOSTICS:true}

logging:
  level:
    root: INFO
    com.ipscentir.appointments: INFO
    com.ipscentir.appointments.infrastructure.security: DEBUG
