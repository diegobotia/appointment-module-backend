spring:
  datasource:
    url: "jdbc:h2:mem:appointments_test_db;MODE=PostgreSQL;INIT=CREATE SCHEMA IF NOT EXISTS appointments\\;CREATE SCHEMA IF NOT EXISTS hc\\;CREATE SCHEMA IF NOT EXISTS core;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE"
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  sql:
    init:
      mode: never

security:
  n8n:
    api-key: test-n8n-api-key
    base-path: /api/v1/integrations/n8n

patient-registration:
  form-base-url: https://citas-test.ipscentir.com/registro

appointments:
  therapy:
    pending-group-policy: RESCHEDULE
    pending-group-cutoff-minutes: 120

notifications:
  enabled: true
  created-alert-enabled: true
  cancelled-alert-enabled: true
  reminder-24h-enabled: false
  reminder-2h-enabled: false
  max-retry-attempts: 3

twilio:
  enabled: false

resend:
  enabled: false
