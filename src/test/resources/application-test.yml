spring:
  datasource:
    url: jdbc:h2:mem:appointments_test_db;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  sql:
    init:
      mode: never

security:
  n8n:
    api-key: test-n8n-api-key
    base-path: /api/v1/integrations/n8n
  bootstrap:
    superadmin-password: superadmin123
    admin-password: admin123
    especialista-password: especialista123

appointments:
  therapy:
    pending-group-policy: RESCHEDULE
    pending-group-cutoff-minutes: 120
