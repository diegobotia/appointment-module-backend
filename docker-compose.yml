version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ipscentir-postgres
    environment:
      POSTGRES_DB: ipscentir_appointments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ipscentir-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ipscentir-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ipscentir.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - ipscentir-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ipscentir-mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - ipscentir-network

volumes:
  postgres_data:

networks:
  ipscentir-network:
    driver: bridge
