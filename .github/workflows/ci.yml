name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

defaults:
  run:
    working-directory: .

jobs:
  quality:
    name: Build, tests y calidad
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build, test y verify (JaCoCo + SpotBugs)
        env:
          SPRING_PROFILES_ACTIVE: test
        run: mvn -B verify

      - name: Publicar resultado de tests
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Maven Tests
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Comentario de cobertura en PR
        if: github.event_name == 'pull_request' && success()
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: JaCoCo (servicios críticos ≥80% en verify)
          update-comment: true

      - name: Subir reportes HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            target/site/jacoco/
            target/spotbugs.html
            target/spotbugsXml.xml
          retention-days: 14

  dependency-review:
    name: Revisión de dependencias
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
